<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiki Taka | Nuestra Carta</title>
  <meta name="description" content="Carta digital premium de Tiki Taka." />
  <meta name="theme-color" content="#050505" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300..800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --bg-soft: #0b0b0b;
      --panel: rgba(255,255,255,0.06);
      --panel-2: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.10);
      --line-strong: rgba(255,255,255,0.14);
      --text: #f7f7f7;
      --muted: rgba(255,255,255,0.64);
      --soft: rgba(255,255,255,0.42);
      --brand: #e4002b;
      --brand-soft: rgba(228,0,43,0.16);
      --brand-strong: rgba(228,0,43,0.26);
      --shadow: 0 22px 80px rgba(0,0,0,0.45);
      --radius-xl: 34px;
      --radius-lg: 26px;
      --radius-md: 18px;
      --container: 1320px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Funnel Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(228,0,43,0.18), transparent 24%),
        radial-gradient(circle at 88% 8%, rgba(228,0,43,0.12), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(228,0,43,0.08), transparent 28%),
        linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, auto, 42px 42px, 42px 42px, auto;
      min-height: 100vh;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    .progress {
      position: fixed;
      inset: 0 auto auto 0;
      height: 3px;
      width: 0;
      background: linear-gradient(90deg, #fff, var(--brand));
      box-shadow: 0 0 16px rgba(228,0,43,0.55);
      z-index: 50;
      transition: width 120ms linear;
    }

    .container { width: min(calc(100% - 32px), var(--container)); margin: 0 auto; }

    .page-shell { padding: 18px 0 36px; }

    .masthead {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(0,0,0,0.38);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 28px 22px 22px;
    }

    .masthead::before,
    .masthead::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(36px);
      pointer-events: none;
    }

    .masthead::before {
      width: 180px;
      height: 180px;
      right: -30px;
      top: -30px;
      background: rgba(228,0,43,0.20);
    }

    .masthead::after {
      width: 160px;
      height: 160px;
      left: -24px;
      bottom: -34px;
      background: rgba(255,255,255,0.05);
    }

    .brand-stack {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    .brand-logo {
      width: min(100%, 420px);
      filter: drop-shadow(0 18px 36px rgba(0,0,0,0.34));
    }

    .title-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 20px;
      border: 1px solid rgba(228,0,43,0.22);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(228,0,43,0.16), rgba(228,0,43,0.08));
      color: rgba(255,255,255,0.92);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 12px 24px rgba(0,0,0,0.18);
    }

    .nav-wrap { position: sticky; top: 14px; z-index: 20; margin-top: 18px; }

    .nav-shell {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      scrollbar-width: none;
    }

    .nav-shell::-webkit-scrollbar { display: none; }

    .nav-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.72);
      font-size: 0.92rem;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .nav-link:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.08);
      color: #fff;
    }

    .nav-link.active {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.10);
      color: #fff;
    }

    .nav-index {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: background 180ms ease, box-shadow 180ms ease;
    }

    .nav-link.active .nav-index {
      background: var(--brand);
      box-shadow: 0 0 0 7px rgba(228,0,43,0.12);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .menu-card {
      position: relative;
      grid-column: span 4;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 30px;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        rgba(0,0,0,0.38);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transform: translateY(18px);
      opacity: 0;
      transition: transform 260ms ease, border-color 260ms ease, background 260ms ease, opacity 400ms ease;
    }

    .menu-card.visible { opacity: 1; transform: translateY(0); }

    .menu-card:hover {
      transform: translateY(-4px);
      border-color: var(--line-strong);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)),
        rgba(0,0,0,0.42);
    }

    .menu-card::before {
      content: "";
      position: absolute;
      right: -32px;
      top: -46px;
      width: 140px;
      height: 140px;
      border-radius: 34px;
      transform: rotate(18deg);
      background: linear-gradient(180deg, rgba(228,0,43,0.24), rgba(228,0,43,0.03));
      opacity: 0.8;
      pointer-events: none;
    }

    .menu-card.wide { grid-column: span 6; }
    .menu-card.compact-card { grid-column: span 3; }

    .card-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      align-items: flex-start;
    }

    .section-number {
      margin-bottom: 10px;
      color: var(--brand);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.18em;
    }

    .card-top h2 {
      margin: 0;
      font-size: clamp(1.4rem, 2vw, 1.8rem);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .section-meta {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .menu-list { position: relative; z-index: 1; }

    .menu-row,
    .menu-head {
      display: grid;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .menu-row:last-child { border-bottom: 0; }
    .menu-row.grid-single,
    .menu-head.grid-single { grid-template-columns: minmax(0, 1fr) auto; }
    .menu-row.grid-triple,
    .menu-head.grid-triple { grid-template-columns: minmax(0, 1fr) 82px 82px; }

    .menu-head {
      padding: 0 0 12px;
      margin-bottom: 2px;
      color: rgba(255,255,255,0.42);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .menu-head span:first-child { color: transparent; user-select: none; }
    .menu-head span:not(:first-child) { text-align: center; }

    .menu-row { padding: 13px 0; }

    .menu-name {
      padding-right: 10px;
      color: rgba(255,255,255,0.96);
      line-height: 1.35;
      text-wrap: balance;
    }

    .price-pill {
      min-width: 82px;
      padding: 10px 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      text-align: center;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .note-row {
      margin-top: 8px;
      padding: 12px 14px;
      border: 1px solid rgba(228,0,43,0.16);
      border-radius: 18px;
      background: rgba(228,0,43,0.10);
      color: rgba(255,255,255,0.92);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .footer-shell {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      color: var(--muted);
      text-align: center;
    }

    .footer-mark { display: block; height: 26px; width: auto; flex: 0 0 auto; opacity: 0.98; }

    @media (max-width: 1100px) {
      .menu-card { grid-column: span 6; }
      .menu-card.wide { grid-column: span 12; }
      .menu-card.compact-card { grid-column: span 6; }
    }

    @media (max-width: 760px) {
      .page-shell { padding-top: 14px; }
      .container { width: min(calc(100% - 20px), var(--container)); }
      .masthead { padding: 22px 16px 18px; border-radius: 28px; }
      .brand-logo { width: min(100%, 290px); }
      .title-chip { letter-spacing: 0.18em; font-size: 0.7rem; padding-inline: 16px; }
      .nav-wrap { top: 10px; }
      .nav-shell { padding: 8px; gap: 8px; }
      .nav-link { padding: 10px 12px; font-size: 0.88rem; }
      .menu-grid { grid-template-columns: 1fr; gap: 14px; }
      .menu-card,
      .menu-card.wide,
      .menu-card.compact-card { grid-column: span 1; padding: 18px; border-radius: 24px; }
      .card-top { flex-direction: column; align-items: flex-start; margin-bottom: 16px; }
      .section-meta { white-space: normal; }
      .menu-row.grid-triple,
      .menu-head.grid-triple { grid-template-columns: minmax(0, 1fr) 76px 76px; gap: 8px; }
      .menu-row.grid-single,
      .menu-head.grid-single { grid-template-columns: minmax(0, 1fr) 76px; gap: 8px; }
      .price-pill { min-width: unset; padding: 9px 8px; font-size: 0.86rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .menu-card, .nav-link, .progress { transition: none; }
    }
  </style>

    const navShell = document.getElementById('nav-shell');
    const menuGrid = document.getElementById('menu-grid');
    const progress = document.getElementById('progress');

    const escapeHtml = (value = '') => value
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    const navMarkup = sections.map((section, index) => `
      <a href="#${section.key}" class="nav-link" data-target="${section.key}">
        <span class="nav-index">${String(index + 1).padStart(2, '0')}</span>
        <span>${escapeHtml(section.title)}</span>
      </a>
    `).join('');

    const renderSingleRows = (items) => items.map((item) => item.note
      ? `<div class="note-row">${escapeHtml(item.note)}</div>`
      : `
        <div class="menu-row grid-single">
          <span class="menu-name">${escapeHtml(item.name)}</span>
          <span class="price-pill">${escapeHtml(item.price)}</span>
        </div>
      `
    ).join('');

    const renderTripleRows = (items, label2) => `
      <div class="menu-head grid-triple">
        <span>·</span>
        <span>Chupito</span>
        <span>${label2}</span>
      </div>
      ${items.map((item) => item.note
        ? `<div class="note-row">${escapeHtml(item.note)}</div>`
        : `
          <div class="menu-row grid-triple">
            <span class="menu-name">${escapeHtml(item.name)}</span>
            <span class="price-pill">${escapeHtml(item.price1)}</span>
            <span class="price-pill">${escapeHtml(item.price2)}</span>
          </div>
        `
      ).join('')}
    `;

    const sectionMarkup = sections.map((section, index) => {
      const items = menu[section.key] || [];
      const cardClass = [
        'menu-card',
        section.wide ? 'wide' : '',
        section.compact ? 'compact-card' : ''
      ].filter(Boolean).join(' ');
      const listMarkup = section.kind === 'triple'
        ? renderTripleRows(items, section.meta.includes('Copa') ? 'Copa' : 'Combinado')
        : renderSingleRows(items);

      return `
        <section id="${section.key}" class="${cardClass}">
          <div class="card-top">
            <div>
              <div class="section-number">${String(index + 1).padStart(2, '0')}</div>
              <h2>${escapeHtml(section.title)}</h2>
            </div>
            <div class="section-meta">${escapeHtml(section.meta)}</div>
          </div>
          <div class="menu-list">${listMarkup}</div>
        </section>
      `;
    }).join('');

    navShell.innerHTML = navMarkup;
    menuGrid.innerHTML = sectionMarkup;

    const cards = [...document.querySelectorAll('.menu-card')];
    const navLinks = [...document.querySelectorAll('.nav-link')];
    const sectionEls = sections.map((section) => document.getElementById(section.key)).filter(Boolean);

    const updateProgress = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const percent = max > 0 ? (window.scrollY / max) * 100 : 0;
      progress.style.width = `${Math.min(100, Math.max(0, percent))}%`;
    };

    updateProgress();
    window.addEventListener('scroll', updateProgress, { passive: true });

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.12 });

    cards.forEach((card) => revealObserver.observe(card));

    const activeObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const id = entry.target.id;
        navLinks.forEach((link) => link.classList.toggle('active', link.dataset.target === id));
      });
    }, { rootMargin: '-22% 0px -62% 0px', threshold: 0.05 });

    sectionEls.forEach((sectionEl) => activeObserver.observe(sectionEl));
  </script>
